name: CI

on:
  pull_request:

  push:
    branches: [ main ]
jobs:
  build-linux-nix:
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v7

    - name: Install Nix
      uses: cachix/install-nix-action@v27

    - name: Build everything
      run: nix build

  build-linux-cabal:
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v7

    - name: Install Nix
      uses: cachix/install-nix-action@v27

    - uses: actions/cache@v4
      name: Cache ~/.cabal/packages, ~/.cabal/store and dist-newstyle
      with:
        path: |
          ~/.cabal/packages
          ~/.cabal/store
          dist-newstyle
        key: ${{ runner.os }}-cabal-${{ hashFiles('remora.cabal', 'cabal.project') }}

    - name: Build Remora
      run: |
        nix develop .#ci --command bash -c '
          cabal update
          cabal build
          cabal test
        '
